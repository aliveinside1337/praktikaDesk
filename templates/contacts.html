<!-- templates/contacts.html -->
<div id="contactsContainer">
    <!-- Здесь будут карточки контактов, генерируемые через JS -->
</div>

<!-- Пример структуры карточки -->
<template id="contactCardTemplate">
    <div class="contact-card">
        <div class="contact-header">
            <div class="contact-name"></div>
            <span class="badge"></span>
        </div>
        <div class="contact-info">
            <div class="info-item">
                <i>📞</i> <span class="info-phone"></span>
            </div>
            <div class="info-item">
                <i>✉️</i> <span class="info-email"></span>
            </div>
            <div class="info-item">
                <i>📍</i> <span class="info-address"></span>
            </div>
        </div>
        <div class="card-actions">
            <button class="btn-edit">Редактировать</button>
            <button class="btn-delete">Удалить</button>
        </div>
    </div>
</template>
