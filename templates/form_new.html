<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить контакт</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-black rounded flex items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 12C14.2091 12 16 10.2091 16 8C16 5.79086 14.2091 4 12 4C9.79086 4 8 5.79086 8 8C8 10.2091 9.79086 12 12 12Z" fill="white"/><path d="M12 14C8.13401 14 5 17.134 5 21H19C19 17.134 15.866 14 12 14Z" fill="white"/></svg>
                </div>
                <div><h1 class="text-xl font-bold">Управление Контактами</h1></div>
            </div>
            <div class="flex gap-3">
                <a href="home.html" class="btn btn-white">Назад</a>
            </div>
        </div>
    </header>

    <div class="app-container">
        <div class="card">
            <h2 class="text-2xl font-bold mb-6">Новый контакт</h2>
            <form onsubmit="return false;" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs text-gray-400 font-medium ml-1">Полное имя</label>
                    <input type="text" class="input-field" placeholder="Введите имя...">
                </div>
                <div class="space-y-1">
                    <label class="text-xs text-gray-400 font-medium ml-1">Телефон</label>
                    <input type="text" class="input-field" placeholder="+7 (999) ...">
                </div>
                <button class="btn btn-purple mt-4 w-full justify-center">Создать контакт</button>
            </form>
        </div>
    </div>
</body>
</html>
