<!-- templates/form_new.html -->
<div class="modal-overlay" id="modalAdd">
    <div class="modal">
        <div class="modal-header">
            <h3>Добавить контакт</h3>
            <button class="close-modal">&times;</button>
        </div>
        <form id="addContactForm">
            <div class="modal-body">
                <div class="input-group">
                    <label>Имя *</label>
                    <input type="text" name="name" required placeholder="Иван Иванов">
                </div>
                <div class="input-group">
                    <label>Телефон *</label>
                    <input type="text" name="phone" required placeholder="+7 (999) 123-45-67">
                </div>
                <div class="input-group">
                    <label>Email *</label>
                    <input type="email" name="email" required placeholder="example@mail.ru">
                </div>
                <div class="input-group">
                    <label>Адрес *</label>
                    <textarea name="address" required placeholder="г. Москва, ул. Пушкина, д. 10"></textarea>
                </div>
                <div class="input-group">
                    <label>Категория *</label>
                    <select name="category" required>
                        <option>Работа</option>
                        <option>Друзья</option>
                        <option>Семья</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-menu close-modal">Отмена</button>
                <button type="submit" class="btn-add">Добавить</button>
            </div>
        </form>
    </div>
</div>
