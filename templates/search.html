<!-- templates/search.html -->
<section class="search-section">
    <div class="search-grid">
        <div class="input-group">
            <label>Поиск</label>
            <input type="text" id="searchInput" placeholder="Поиск по имени, телефону, email, адресу...">
        </div>
        <div class="input-group">
            <label>Категория</label>
            <select id="categoryFilter">
                <option value="all">Все категории</option>
                <option value="Работа">Работа</option>
                <option value="Друзья">Друзья</option>
                <option value="Семья">Семья</option>
            </select>
        </div>
    </div>
    <div class="sort-bar">
        <span class="sort-label">Сортировка:</span>
        <div class="sort-tag active" data-sort="name">Имя ↑</div>
        <div class="sort-tag" data-sort="phone">Телефон</div>
        <div class="sort-tag" data-sort="email">Email</div>
        <div class="sort-tag" data-sort="category">Категория</div>
        <div class="sort-tag" data-sort="date">Дата</div>
    </div>
</section>
