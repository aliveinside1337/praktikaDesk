<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление Контактами</title>
    <link rel="stylesheet" href="static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container header-content">
            <div class="logo">
                <div class="logo-icon">👤</div>
                <div>
                    <h1 style="font-size: 1.25rem; font-weight: 700;">Управление Контактами</h1>
                    <p style="font-size: 12px; color: #6b7280;">Всего контактов: <span id="totalCount">2</span></p>
                </div>
            </div>
            <div class="header-btns">
                <button class="btn-menu">Меню</button>
                <button class="btn-add" onclick="document.getElementById('modalAdd').style.display='flex'"><span>+</span> Добавить контакт</button>
                <button class="btn-export" style="background: #059669; color: white;">📥 Экспорт</button>
                <button class="btn-import" style="background: #2563eb; color: white;">📤 Импорт</button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Search Section -->
        <section class="search-section">
            <div class="search-grid">
                <div class="input-group">
                    <label>Поиск</label>
                    <input type="text" id="searchInput" placeholder="Поиск по имени, телефону, email, адресу...">
                </div>
                <div class="input-group">
                    <label>Категория</label>
                    <select id="categoryFilter">
                        <option value="all">Все категории</option>
                        <option value="Работа">Работа</option>
                        <option value="Друзья">Друзья</option>
                    </select>
                </div>
            </div>
            <div class="sort-bar">
                <span class="sort-label">Сортировка:</span>
                <div class="sort-tag active">Имя ↑</div>
                <div class="sort-tag">Телефон</div>
                <div class="sort-tag">Email</div>
                <div class="sort-tag">Категория</div>
                <div class="sort-tag">Дата</div>
            </div>
        </section>

        <div id="contacts-list">
            <!-- Контакты загружаются скриптом -->
        </div>
    </main>

    <!-- Modal Add (templates/form_new.html) -->
    <div class="modal-overlay" id="modalAdd">
        <div class="modal">
            <div class="modal-header">
                <h3>Добавить контакт</h3>
                <button onclick="document.getElementById('modalAdd').style.display='none'" style="background:none; border:none; font-size:24px; color:#9ca3af; cursor:pointer">&times;</button>
            </div>
            <form id="addForm" onsubmit="event.preventDefault(); addContact(this);">
                <div class="modal-body">
                    <div class="input-group"><label>Имя *</label><input type="text" name="name" required placeholder="Иван Иванов"></div>
                    <div class="input-group"><label>Телефон *</label><input type="text" name="phone" required placeholder="+7 (999) 123-45-67"></div>
                    <div class="input-group"><label>Email *</label><input type="email" name="email" required placeholder="example@mail.ru"></div>
                    <div class="input-group"><label>Адрес *</label><textarea name="address" required placeholder="г. Москва, ул. Пушкина, д. 10" style="height:80px"></textarea></div>
                    <div class="input-group"><label>Категория *</label><select name="category"><option>Работа</option><option>Друзья</option><option>Семья</option></select></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-menu" onclick="document.getElementById('modalAdd').style.display='none'">Отмена</button>
                    <button type="submit" class="btn-add">Добавить</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let contacts = [
            { id: 1, name: 'Александр Петров', phone: '+7 (999) 123-45-67', email: 'a.petrov@example.com', address: 'г. Москва, ул. Ленина, д. 15, кв. 42', category: 'Работа', date: Date.now() - 10000 },
            { id: 2, name: 'Дмитрий Сидоров', phone: '+7 (977) 111-22-33', email: 'dmitry.s@gmail.com', address: 'г. Казань, ул. Баумана, д. 5', category: 'Друзья', date: Date.now() - 20000 }
        ];

        let currentSort = 'name';
        let sortDirection = 'asc';
        let editingId = null;

        // Инициализация кнопок сортировки
        document.querySelectorAll('.sort-tag').forEach(tag => {
            tag.style.cursor = 'pointer';
            tag.addEventListener('click', () => {
                const sortKey = tag.innerText.toLowerCase().includes('имя') ? 'name' :
                               tag.innerText.toLowerCase().includes('телефон') ? 'phone' :
                               tag.innerText.toLowerCase().includes('email') ? 'email' :
                               tag.innerText.toLowerCase().includes('категория') ? 'category' : 'date';

                if (currentSort === sortKey) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort = sortKey;
                    sortDirection = 'asc';
                }

                // Обновляем визуальный стиль
                document.querySelectorAll('.sort-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                tag.innerText = tag.innerText.replace(' ↑', '').replace(' ↓', '') + (sortDirection === 'asc' ? ' ↑' : ' ↓');

                render();
            });
        });

        function render() {
            const list = document.getElementById('contacts-list');
            document.getElementById('totalCount').innerText = contacts.length;

            // Сначала сортируем
            const sortedContacts = [...contacts].sort((a, b) => {
                let valA = a[currentSort].toString().toLowerCase();
                let valB = b[currentSort].toString().toLowerCase();
                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });

            // Потом группируем
            const groups = sortedContacts.reduce((acc, c) => {
                acc[c.category] = acc[c.category] || [];
                acc[c.category].push(c);
                return acc;
            }, {});

            list.innerHTML = '';

            if (contacts.length === 0) {
                list.innerHTML = '<div style="text-align:center; padding: 50px; color: #9ca3af;">Список контактов пуст</div>';
                return;
            }

            Object.entries(groups).forEach(([cat, items]) => {
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `
                    <h2 class="category-title">${cat} (${items.length})</h2>
                    <div class="contact-grid">
                        ${items.map(c => `
                            <div class="contact-card">
                                <div class="contact-header">
                                    <div class="contact-name">${c.name}</div>
                                    <span class="badge">${c.category}</span>
                                </div>
                                <div class="contact-info">
                                    <div class="info-item">📞 ${c.phone}</div>
                                    <div class="info-item">✉️ ${c.email}</div>
                                    <div class="info-item">📍 ${c.address}</div>
                                </div>
                                <div class="card-actions">
                                    <button class="btn-edit" onclick="editContact(${c.id})">Редактировать</button>
                                    <button class="btn-delete" onclick="deleteC(${c.id})">Удалить</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                list.appendChild(section);
            });
        }

        function editContact(id) {
            const c = contacts.find(item => item.id === id);
            if (!c) return;

            editingId = id;
            const form = document.getElementById('addForm');
            form.name.value = c.name;
            form.phone.value = c.phone;
            form.email.value = c.email;
            form.address.value = c.address;
            form.category.value = c.category;

            document.querySelector('#modalAdd h3').innerText = 'Редактировать контакт';
            document.querySelector('#modalAdd .btn-add').innerText = 'Сохранить';
            document.getElementById('modalAdd').style.display = 'flex';
        }

        function openAddModal() {
            editingId = null;
            const form = document.getElementById('addForm');
            form.reset();
            document.querySelector('#modalAdd h3').innerText = 'Добавить контакт';
            document.querySelector('#modalAdd .btn-add').innerText = 'Добавить';
            document.getElementById('modalAdd').style.display = 'flex';
        }

        function saveContact(form) {
            const contactData = {
                name: form.name.value,
                phone: form.phone.value,
                email: form.email.value,
                address: form.address.value,
                category: form.category.value,
                date: editingId ? contacts.find(c => c.id === editingId).date : Date.now()
            };

            if (editingId) {
                const index = contacts.findIndex(c => c.id === editingId);
                contacts[index] = { ...contactData, id: editingId };
            } else {
                contacts.push({ ...contactData, id: Date.now() });
            }

            form.reset();
            document.getElementById('modalAdd').style.display = 'none';
            editingId = null;
            render();
        }

        // Обновляем кнопку в хедере, чтобы она вызывала правильную функцию
        document.querySelector('.btn-add').onclick = openAddModal;
        // Обновляем обработчик формы
        document.getElementById('addForm').onsubmit = function(e) {
            e.preventDefault();
            saveContact(this);
        };

        function deleteC(id) {
            if(confirm('Удалить контакт?')) {
                contacts = contacts.filter(c => c.id !== id);
                render();
            }
        }

        render();
    </script>
</body>
</html>
